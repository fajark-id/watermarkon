<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermarkon - Watermark Lokal & Aman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-area">
            <h1>WATERMARKON 🍉</h1>
            <p>Watermark otomatis langsung dari browser.</p>
        </div>
        <div class="header-controls">
            <button id="themeToggle" class="btn-icon">☀️/🌙</button>
            <button id="menuBurger" class="btn-icon">☰</button>
        </div>
    </header>

    <main class="app-container">
        
        <section class="panel-left">
            <h2>📁 Pilih Dokumen</h2>
            
            <div id="uploadZone" class="upload-zone">
                <p class="upload-title">Klik atau Tarik dokumen ke sini</p>
                <p class="upload-subtitle">Mendukung file PNG, JPG, dan PDF</p>
                <p class="upload-warning">Pemrosesan lokal di memori browser, dokumen Anda tidak diupload ke server mana pun.</p>
                <input type="file" id="fileInput" accept="image/*,application/pdf" style="display: none;">
            </div>

            <div class="zoom-container">
                <div class="zoom-controls-row">
                    <button id="btnZoomOut" class="btn-zoom">-</button>
                    <input type="range" id="zoomSlider" min="30" max="200" value="100" class="zoom-slider">
                    <button id="btnZoomIn" class="btn-zoom">+</button>
                </div>
                <button id="btnZoomFit" class="btn-text-link">Dokumen Auto fit to page (<span id="zoomLabel">100%</span>)</button>
            </div>

            <div id="documentPreview" class="document-preview">
                </div>
        </section>

        <section class="panel-right">
            <h2>⚙️ Atur Watermark</h2>
            
            <div class="control-group">
                <label for="watermarkStyle">Style & Pola Penempatan</label>
                <select id="watermarkStyle">
                    <option value="center">Teks di Tengah (Cabang 1)</option>
                    <option value="scattered">Penuh Tersebar (Cabang 2)</option>
                    <option value="footer">Teks di Bawah</option>
                </select>
            </div>

            <div class="control-group">
                <label for="watermarkText">Teks Watermark</label>
                <input type="text" id="watermarkText" value="DOKUMEN COPY" placeholder="Masukkan teks watermark...">
                <div class="template-buttons">
                    <button type="button" class="btn-template">+ Tanggal</button>
                    <button type="button" class="btn-template">Untuk Verifikasi</button>
                    <button type="button" class="btn-template">Dokumen Contoh</button>
                </div>
            </div>

            <h3>Tampilan Visual</h3>

            <div class="control-group">
                <label for="opacitySlider">Transparansi (Opacity)</label>
                <input type="range" id="opacitySlider" min="10" max="100" value="50">
            </div>

            <div class="control-group">
                <label for="fontSizeInput">Ukuran Font (px)</label>
                <input type="number" id="fontSizeInput" min="10" max="200" value="32">
            </div>

            <div class="control-group">
                <label for="rotationSlider">Rotasi Kemiringan</label>
                <input type="range" id="rotationSlider" min="-90" max="90" value="-30">
            </div>

            <div class="control-group">
                <label>Warna Teks</label>
                <div class="color-picker-container">
                    <div class="color-circle active" style="background-color: #ff0000;" data-color="255, 0, 0"></div>
                    <div class="color-circle" style="background-color: #000000;" data-color="0, 0, 0"></div>
                    <div class="color-circle" style="background-color: #0000ff;" data-color="0, 0, 255"></div>
                    <div id="customColorBtn" class="color-circle custom-picker-trigger">🎨</div>
                    <input type="color" id="hiddenColorInput" value="#ff0000" style="display: none;">
                </div>
            </div>

            <div class="action-buttons">
                <button id="btnSave" class="btn-primary">💾 Simpan Dokumen</button>
                <button id="btnReset" class="btn-secondary">Ulangi Watermark</button>
            </div>
        </section>

    </main>

</body>
</html>
